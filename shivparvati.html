<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Forever Together ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial,sans-serif;

    background:linear-gradient(135deg,#fff7d6,#ffe6f2);

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;

    overflow:hidden;

}


/* Card */

.card{

    width:98%;

    max-width:1200px;

    height:95vh;

    background:white;

    border-radius:25px;

    padding:10px;

    text-align:center;

    box-shadow:0 15px 35px rgba(0,0,0,.25);

    z-index:2;

}


/* Slideshow Image */

#slide{

    width:100%;

    height:85vh;

    object-fit:contain;

    border-radius:20px;

    transition:opacity 1s ease-in-out;

}


/* Button */

.btn{

    display:inline-block;

    margin-top:5px;

    padding:12px 30px;

    background:#d63384;

    color:white;

    text-decoration:none;

    border-radius:35px;

    font-size:20px;

    font-weight:bold;

    transition:.3s;

    box-shadow:0 5px 15px rgba(214,51,132,.4);

}


.btn:hover{

    background:#b81f70;

    transform:scale(1.08);

}


/* Floating Hearts */

.heart{

    position:absolute;

    font-size:24px;

    pointer-events:none;

    animation:fall linear infinite;

}


@keyframes fall{


0%{

transform:translateY(-100px);

opacity:1;

}


100%{

transform:translateY(110vh);

opacity:0;

}


}

</style>

</head>


<body>


<div class="card">


<img id="slide" src="oonjal.jpg" alt="Slideshow">


<!-- Romantic Background Music -->

<audio id="bgMusic" loop preload="auto">

    <source src="devon.mp3" type="audio/mpeg">

</audio>



<a href="devan.html" class="btn" onclick="playMusic(event)">

💌 എന്റെ ദേവന് ഒരു ചെറിയ സ്നേഹസമ്മാനം ❤️

</a>


</div>



<script>


/* Start Music Before Opening Next Page */

function playMusic(event){

    event.preventDefault();


    const music = document.getElementById("bgMusic");


    music.volume = 0.8;


    music.play()
    .then(()=>{


        setTimeout(()=>{

            window.location.href="devan.html";

        },1500);


    })
    .catch(()=>{


        window.location.href="devan.html";


    });


}



/* Slideshow Images */


const images=[


"oonjal.jpg",

"IMG_7592.jpeg",

"IMG_7593.jpeg",

"IMG_7594.jpeg",

"IMG_7595.jpeg",

"IMG_7596.jpeg",

"IMG_7597.jpeg",

"IMG_7598.jpeg",

"IMG_7600.jpeg"

];



let current=0;


const slide=document.getElementById("slide");



/* Slideshow */


setInterval(()=>{


slide.style.opacity=0;


setTimeout(()=>{


current=(current+1)%images.length;


slide.src=images[current];


slide.style.opacity=1;


},500);


},3000);





/* Floating Hearts */


function createHeart(){


let heart=document.createElement("div");


heart.className="heart";


heart.innerHTML="❤️";


heart.style.left=Math.random()*100+"vw";


heart.style.animationDuration=(3+Math.random()*4)+"s";



document.body.appendChild(heart);



setTimeout(()=>{


heart.remove();


},7000);


}



setInterval(createHeart,400);



</script>


</body>

</html>
