<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Love</title>

<style>

body{
    margin:0;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    font-family:Arial;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    z-index:10;
}

button{
    padding:15px 35px;
    margin:15px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:22px;
}

#yes{
    background:#4CAF50;
    color:white;
}

#no{
    background:#f44336;
    color:white;
    position:absolute;
}

.heart{
    position:absolute;
    color:red;
    animation:float 6s linear infinite;
    font-size:30px;
}

@keyframes float{

0%{
transform:translateY(100vh);
opacity:0;
}

100%{
transform:translateY(-100px);
opacity:1;
}

}

</style>

</head>

<body>

<audio autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="card">

<h1>❤️ I LOVE YOU ❤️</h1>

<h2>Do You Love Me?</h2>

<button id="yes">YES 💖</button>

<button id="no">NO 😜</button>

</div>

<script>

const no=document.getElementById("no");

no.addEventListener("mouseover",moveButton);

no.addEventListener("click",moveButton);

function moveButton(){

const x=Math.random()*(window.innerWidth-100);

const y=Math.random()*(window.innerHeight-60);

no.style.left=x+"px";
no.style.top=y+"px";

}

document.getElementById("yes").onclick=function(){

window.location="birthday.html";

}

function hearts(){

const heart=document.createElement("div");

heart.innerHTML="❤️";

heart.className="heart";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*30)+"px";

heart.style.animationDuration=(3+Math.random()*5)+"s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},6000);

}

setInterval(hearts,300);

</script>

</body>

</html>
